<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SEDAP Dashboard</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

    <style>
        body{
            background:#f5f6fa;
        }

        .kpi-card{
            border:0;
            border-radius:12px;
        }

        .kpi-title{
            font-size:12px;
            color:#6c757d;
        }

        .kpi-value{
            font-size:20px;
            font-weight:700;
        }

        .section-title{
            font-weight:600;
            margin-bottom:10px;
        }

        .bar{
            height:8px;
            background:#e9ecef;
            border-radius:5px;
            overflow:hidden;
        }

        .bar-fill{
            height:100%;
            background:#0d6efd;
        }

        tr.clickable{
            cursor:pointer;
        }

        tr.clickable:hover{
            background:#f1f3f5;
        }
    </style>
</head>

<body>

<div class="container py-3">

    <!-- HEADER -->
    <div class="mb-3">
        <h4 class="mb-0">SEDAP Dashboard</h4>
        <small id="updatedAt" class="text-muted"></small>

        <button class="btn btn-sm btn-outline-primary mt-2 d-none" id="btnBack" onclick="goBack()">
            ← Kembali ke Kabupaten
        </button>
    </div>

    <!-- KPI -->
    <div class="row g-2 mb-3">

        <div class="col-6 col-md-4 col-lg-2">
            <div class="card kpi-card shadow-sm">
                <div class="card-body">
                    <div class="kpi-title">Target</div>
                    <div class="kpi-value" id="kpiTarget">0</div>
                </div>
            </div>
        </div>

        <div class="col-6 col-md-4 col-lg-2">
            <div class="card kpi-card shadow-sm">
                <div class="card-body">
                    <div class="kpi-title">Open</div>
                    <div class="kpi-value" id="kpiOpen">0</div>
                </div>
            </div>
        </div>

        <div class="col-6 col-md-4 col-lg-2">
            <div class="card kpi-card shadow-sm">
                <div class="card-body">
                    <div class="kpi-title">Draft</div>
                    <div class="kpi-value" id="kpiDraft">0</div>
                </div>
            </div>
        </div>

        <div class="col-6 col-md-4 col-lg-2">
            <div class="card kpi-card shadow-sm">
                <div class="card-body">
                    <div class="kpi-title">Submitted</div>
                    <div class="kpi-value" id="kpiSubmitted">0</div>
                </div>
            </div>
        </div>

        <div class="col-6 col-md-4 col-lg-2">
            <div class="card kpi-card shadow-sm">
                <div class="card-body">
                    <div class="kpi-title">Approved</div>
                    <div class="kpi-value text-success" id="kpiApproved">0</div>
                </div>
            </div>
        </div>

        <div class="col-6 col-md-4 col-lg-2">
            <div class="card kpi-card shadow-sm">
                <div class="card-body">
                    <div class="kpi-title">Rejected</div>
                    <div class="kpi-value text-danger" id="kpiRejected">0</div>
                </div>
            </div>
        </div>

    </div>

    <!-- TREND -->
    <div class="card shadow-sm mb-3">
        <div class="card-body">
            <div class="section-title">Trend Harian</div>
            <canvas id="trendChart" height="120"></canvas>
        </div>
    </div>

    <!-- TABLE KECAMATAN -->
    <div class="card shadow-sm mb-3">
        <div class="card-body">

            <div class="section-title">Kecamatan</div>

            <div class="table-responsive">
                <table class="table table-sm">
                    <thead>
                        <tr>
                            <th>Kecamatan</th>
                            <th>Target</th>
                            <th>Submitted</th>
                            <th>Progress</th>
                        </tr>
                    </thead>
                    <tbody id="tblKecamatan"></tbody>
                </table>
            </div>

        </div>
    </div>

    <!-- TOP USER -->
    <div class="card shadow-sm mb-3">
        <div class="card-body">
            <div class="section-title">Top 5 User</div>
            <div id="topUsers"></div>
        </div>
    </div>

    <!-- BOTTOM USER -->
    <div class="card shadow-sm mb-3">
        <div class="card-body">
            <div class="section-title">Bottom 5 User</div>
            <div id="bottomUsers"></div>
        </div>
    </div>

</div>

<script>
/* =========================
   FORMATTER
========================= */
function formatNumber(x){
    return new Intl.NumberFormat('id-ID').format(x);
}

function formatPercent(x){
    return x.toFixed(1) + "%";
}

/* =========================
   URL MODE
========================= */
const params = new URLSearchParams(window.location.search);
const mode = params.get("mode") || "kabupaten";
const kode = params.get("kode");
const nama = params.get("nama");

/* =========================
   INIT
========================= */
loadData();

function goBack(){
    window.location.href = "index.html";
}

/* =========================
   LOAD DATA
========================= */
async function loadData(){

    const res = await fetch("data/dashboard.json?v=" + Date.now());
    const data = await res.json();

    document.getElementById("updatedAt").innerText =
        "Update: " + data.meta.updated_at;

    renderKPI(data.summary);

    if(mode === "kecamatan"){
        document.getElementById("btnBack").classList.remove("d-none");
        document.getElementById("btnBack").style.display = 'block';
        renderKecamatan(data, kode);
    } else {
        renderKabupaten(data);
        document.getElementById("btnBack").style.display = 'none';
    }
}

/* =========================
   KPI
========================= */
function renderKPI(s){

    document.getElementById("kpiTarget").innerText = formatNumber(s.target);
    document.getElementById("kpiOpen").innerText = formatNumber(s.open);
    document.getElementById("kpiDraft").innerText = formatNumber(s.draft);
    document.getElementById("kpiSubmitted").innerText = formatNumber(s.submitted);
    document.getElementById("kpiApproved").innerText = formatNumber(s.approved);
    document.getElementById("kpiRejected").innerText = formatNumber(s.rejected);
}

/* =========================
   KABUPATEN VIEW
========================= */
function renderKabupaten(data){

    renderTable(data.kecamatan);
    renderUsers("topUsers", data.top_users, true);
    renderUsers("bottomUsers", data.bottom_users, false);
    renderChart(data.history);
}

/* =========================
   KECAMATAN VIEW
========================= */
function renderKecamatan(data, kode){

    const kec = data.kecamatan.find(k => k.kode === kode);

    if(!kec){
        alert("Data kecamatan tidak ditemukan");
        return;
    }

    renderTable([kec]);

    document.querySelector(".section-title").innerText =
        "Kecamatan: " + kec.nama;
}

/* =========================
   TABLE
========================= */
function renderTable(rows){

    let html = "";

    rows.forEach(k => {

        const progress =
            ((k.submitted + k.approved + k.rejected) / k.target) * 100;

        html += `
        <tr class="clickable" onclick="openKecamatan('${k.kode}', '${k.nama}')">
            <td>${k.nama}</td>
            <td>${formatNumber(k.target)}</td>
            <td>${formatNumber(k.submitted)}</td>
            <td>${formatPercent(progress)}</td>
        </tr>`;
    });

    document.getElementById("tblKecamatan").innerHTML = html;
}

/* =========================
   NAVIGATION
========================= */
function openKecamatan(kode, nama){

    window.location.href =
        `?mode=kecamatan&kode=${kode}&nama=${encodeURIComponent(nama)}`;
}

/* =========================
   USERS
========================= */
function renderUsers(id, users, isTop){

    let html = "";

    users.forEach(u => {

        const progress =
            ((u.submitted + u.approved + u.rejected) / u.target) * 100;

        html += `
        <div class="mb-2">
            <div class="d-flex justify-content-between">
                <small>${u.nama}</small>
                <small>${formatPercent(progress)}</small>
            </div>

            <div class="bar">
                <div class="bar-fill"
                     style="width:${progress}%;
                     background:${isTop ? '#198754' : '#dc3545'}"></div>
            </div>
        </div>`;
    });

    document.getElementById(id).innerHTML = html;
}

/* =========================
   CHART
========================= */
function renderChart(history){

    const ctx = document.getElementById("trendChart");

    new Chart(ctx, {
        type: "line",
        data: {
            labels: history.map(x => x.tanggal),
            datasets: [{
                label: "Submitted",
                data: history.map(x => x.submitted),
                borderColor: "#0d6efd"
            },{
                label: "Approved",
                data: history.map(x => x.approved),
                borderColor: "#198754"
            }]
        }
    });
}
</script>

</body>
</html>
